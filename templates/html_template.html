<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} - {version}</title>
    <!-- Include Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {{
            mermaid.initialize({{
                startOnLoad: true,
                theme: 'default',
                securityLevel: 'loose',
                flowchart: {{
                    useMaxWidth: true,
                    htmlLabels: true,
                    curve: 'basis'
                }},
                sequence: {{
                    useMaxWidth: true,
                    showSequenceNumbers: true
                }},
                gantt: {{
                    useMaxWidth: true
                }}
            }});
        }});
    </script>
    <style>
        :root {{
            --primary-color: #333;
            --secondary-color: #666;
            --background-color: #ffffff;
            --code-background: #f5f5f5;
            --border-color: #ddd;
        }}

        body {{
            font-family: "Times New Roman", Times, serif;
            line-height: 1.6;
            font-size: 16px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            background-color: var(--background-color);
            color: var(--primary-color);
        }}

        h1, h2, h3, h4, h5, h6 {{
            color: var(--primary-color);
        }}

        pre {{
            background-color: var(--code-background);
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
        }}

        code {{
            font-family: Consolas, "Courier New", monospace;
            background-color: var(--code-background);
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }}

        table {{
            border-collapse: collapse;
            width: 100%;
            margin: 2em 0;
        }}

        th, td {{
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: left;
        }}

        th {{
            background-color: var(--code-background);
        }}

        a {{
            color: var(--secondary-color);
            text-decoration: none;
        }}

        a:hover {{
            text-decoration: underline;
        }}

        blockquote {{
            border-left: 4px solid var(--border-color);
            padding: 0 1em;
            color: var(--secondary-color);
            margin: 0 0 16px;
        }}

        img {{
            max-width: 100%;
            height: auto;
        }}

        /* Further optimized book cover styles for a professional book-like appearance */
        .book-cover {{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f5f5, #e0e0e0); /* Subtle gradient for a book-like feel */
            color: #333333;
            text-align: center;
            padding: 2rem;
            border: 1px solid #cccccc;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }}

        .book-cover h1 {{
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-family: "Georgia", serif;
            color: #2c3e50;
        }}

        .book-cover h2 {{
            font-size: 2rem;
            margin-bottom: 1.5rem;
            font-family: "Georgia", serif;
            color: #34495e;
        }}

        .book-cover p {{
            font-size: 1.2rem;
            max-width: 700px;
            line-height: 1.8;
            font-family: "Times New Roman", Times, serif;
            color: #555555;
        }}

        .book-cover .subtitle {{
            font-size: 1.1rem;
            margin-bottom: 2rem;
            font-style: italic;
            color: #7f8c8d;
        }}

        .book-cover .date {{
            font-size: 1rem;
            margin-top: 1rem;
            color: #95a5a6;
        }}
    </style>
</head>
<body>
    <div class="book-cover">
        <h1>{title}</h1>
        <h2>Airline Agentic AI Series</h2>
       
        
        <p>By Tedd Yuan</p>
        <p class="date">May 2025</p>
    </div>
    {content}
</body>
</html>
