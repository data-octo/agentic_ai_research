<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} - {version}</title>
    <!-- Include Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {{
            mermaid.initialize({{
                startOnLoad: true,
                theme: 'default',
                securityLevel: 'loose',
                flowchart: {{
                    useMaxWidth: true,
                    htmlLabels: true,
                    curve: 'basis'
                }},
                sequence: {{
                    useMaxWidth: true,
                    showSequenceNumbers: true
                }},
                gantt: {{
                    useMaxWidth: true
                }}
            }});
        }});
    </script>
    <style>
        :root {{
            --primary-color: #333;
            --secondary-color: #666;
            --background-color: #ffffff;
            --code-background: #f5f5f5;
            --border-color: #ddd;
        }}

        body {{
            font-family: "Times New Roman", Times, serif;
            line-height: 1.6;
            font-size: 16px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            background-color: var(--background-color);
            color: var(--primary-color);
        }}

        h1, h2, h3, h4, h5, h6 {{
            color: var(--primary-color);
        }}

        pre {{
            background-color: var(--code-background);
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
        }}

        code {{
            font-family: Consolas, "Courier New", monospace;
            background-color: var(--code-background);
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }}

        table {{
            border-collapse: collapse;
            width: 100%;
            margin: 2em 0;
        }}

        th, td {{
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: left;
        }}

        th {{
            background-color: var(--code-background);
        }}

        a {{
            color: var(--secondary-color);
            text-decoration: none;
        }}

        a:hover {{
            text-decoration: underline;
        }}

        blockquote {{
            border-left: 4px solid var(--border-color);
            padding: 0 1em;
            color: var(--secondary-color);
            margin: 0 0 16px;
        }}

        img {{
            max-width: 100%;
            height: auto;
        }}
    </style>
</head>
<body>
    
    {content}
</body>
</html>
